services:
  app:
    build:
      context: .
      target: app
    image: shopla-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - shopla_storage:/var/www/html/storage/app/public
      - shopla_logs:/var/www/html/storage/logs
    networks:
      - shopla

  nginx:
    build:
      context: .
      target: nginx
    image: shopla-nginx:latest
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - shopla_storage:/var/www/html/public/storage:ro
    networks:
      - shopla

  worker:
    image: shopla-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=120
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - shopla_storage:/var/www/html/storage/app/public
      - shopla_logs:/var/www/html/storage/logs
    networks:
      - shopla

  scheduler:
    image: shopla-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - shopla_storage:/var/www/html/storage/app/public
      - shopla_logs:/var/www/html/storage/logs
    networks:
      - shopla

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-shopla}
      POSTGRES_USER: ${DB_USERNAME:-shopla}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-shopla} -d ${DB_DATABASE:-shopla}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - shopla_db:/var/lib/postgresql/data
    networks:
      - shopla

networks:
  shopla:
    driver: bridge

volumes:
  shopla_db:
  shopla_storage:
  shopla_logs:
